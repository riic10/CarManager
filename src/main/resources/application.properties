# ---- Datasource (matches docker-compose Postgres settings) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/carmanager
spring.datasource.username=carmanager
spring.datasource.password=carmanager

# ---- JPA / Hibernate ----
# Flyway owns the schema, so Hibernate must NOT create/alter tables.
spring.jpa.hibernate.ddl-auto=validate
# Log the SQL Hibernate generates (useful while learning).
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- Flyway (hand-written migrations in src/main/resources/db/migration) ----
spring.flyway.enabled=true

# ---- CORS (allowed frontend origin; comma-separated; override in prod via APP_CORS_ALLOWED_ORIGINS) ----
app.cors.allowed-origins=http://localhost:5173

# ---- Server (Render injects a dynamic $PORT; fall back to 8080 locally) ----
server.port=${PORT:8080}