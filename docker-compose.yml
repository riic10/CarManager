services:
  postgres:
    image: postgres:16
    container_name: carmanager-postgres
    environment:
      POSTGRES_DB: carmanager
      POSTGRES_USER: carmanager
      POSTGRES_PASSWORD: carmanager
    ports:
      - "5432:5432"
    volumes:
      - carmanager-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carmanager -d carmanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: carmanager-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carmanager
      SPRING_DATASOURCE_USERNAME: carmanager
      SPRING_DATASOURCE_PASSWORD: carmanager
    ports:
      - "8080:8080"

volumes:
  carmanager-pgdata:
